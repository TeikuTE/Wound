
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <style>
      .ink      { fill: none; stroke: #1C1410; stroke-width: 0.75; }
      .ink-fill { fill: #1C1410; stroke: none; }
      .gold     { fill: #8B6914; stroke: none; }
      .faded    { fill: #7A6E5F; stroke: none; }
      g.ink line, g.ink path { fill: none; stroke: #1C1410; stroke-width: 0.75; }
    </style>
  </defs>
  
  <circle class="ink" cx="60" cy="60" r="44"></circle>
  <circle class="ink" cx="60" cy="60" r="40" stroke-dasharray="1 3"></circle>
  
  <g class="ink">
    <line x1="60" y1="20" x2="60" y2="28"></line>
    <line x1="60" y1="92" x2="60" y2="100"></line>
    <line x1="20" y1="60" x2="28" y2="60"></line>
    <line x1="92" y1="60" x2="100" y2="60"></line>
  </g>
  
  <text x="60" y="18" text-anchor="middle" font-family="EB Garamond, serif" font-size="9" font-style="italic" fill="#1C1410">N</text>
  
  <polygon class="gold" points="60,28 57,60 63,60"></polygon>
  <polygon class="ink-fill" points="72,82 58,60 62,60" transform="rotate(15 60 60)"></polygon>
  
  <path class="ink" d="M30 72 L52 58 L68 66 L90 50" stroke-dasharray="2 2"></path>
  
  <circle class="gold" cx="60" cy="60" r="2"></circle>
