
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.55&#xA;                             0 0 0 0 0.42&#xA;                             0 0 0 0 0.28&#xA;                             0 0 0 0.35 0"></feColorMatrix>
    </filter>
    <filter id="blotches">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="3"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.45&#xA;                             0 0 0 0 0.32&#xA;                             0 0 0 0 0.18&#xA;                             0 0 0 0.15 0"></feColorMatrix>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#F0E6D0"></rect>
  <rect width="400" height="400" filter="url(#blotches)"></rect>
  <rect width="400" height="400" filter="url(#paper)"></rect>
</svg>